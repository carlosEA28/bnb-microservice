_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://host.docker.internal:3000

  - name: property
    url: http://host.docker.internal:3001

  - name: booking
    url: http://host.docker.internal:3002

  - name: payment
    url: http://host.docker.internal:3003

routes:
  - name: auth-route
    service: auth
    protocols:
      - http
      - https
    paths:
      - /users
    strip_path: false

  #  property (sem JWT)
  - name: property-public-available
    service: property
    protocols:
      - http
      - https
    paths:
      - /properties/available
    methods:
      - GET
    strip_path: false

  - name: property-public-search
    service: property
    protocols:
      - http
      - https
    paths:
      - /properties/search
    methods:
      - GET
    strip_path: false

  #  property (com JWT)
  - name: property-route
    service: property
    protocols:
      - http
      - https
    paths:
      - /properties
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_path: false

  - name: booking-route
    service: booking
    protocols:
      - http
      - https
    paths:
      - /bookings
    strip_path: false

  - name: payment-route
    service: payment
    protocols:
      - http
      - https
    paths:
      - /payments
    strip_path: false

