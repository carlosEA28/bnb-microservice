plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin

  - name: jwt
    route: property-route
    config:
      key_claim_name: kid
      claims_to_verify:
        - exp
      header_names:
        - authorization

  - name: jwt
    route: booking-route
    config:
      key_claim_name: kid
      claims_to_verify:
        - exp
      header_names:
        - authorization

  - name: jwt
    route: payment-route
    config:
      key_claim_name: kid
      claims_to_verify:
        - exp
      header_names:
        - authorization
